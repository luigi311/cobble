name: build

on:
  push:
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Rust daemon/gui  ────────────────────────────────────────────────────────
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            debhelper devscripts \
            pkg-config libexpat-dev build-essential \
            libfontconfig-dev libfreetype-dev

      - name: Verify tag matches changelog version
        if: github.event_name == 'release'
        run: |
          CHANGELOG_VERSION="$(dpkg-parsechangelog -S Version | sed 's/-[0-9]*$//')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "changelog: ${CHANGELOG_VERSION}   tag: ${TAG_VERSION}"
          if [ "$CHANGELOG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${TAG_VERSION} does not match debian/changelog version ${CHANGELOG_VERSION}. Bump the changelog (dch -v ${TAG_VERSION}-1) and re-tag." >&2
            exit 1
          fi

      - name: Build .deb
        run: |
          # -d skips the apt build-dep check; cargo/rustc are satisfied by
          # the rustup toolchain installed above, not the apt packages.
          dpkg-buildpackage -us -uc -b -d
          mkdir -p dist
          mv ../cobbled_*_${{ matrix.arch }}.deb dist/
          mv ../cobble_*_${{ matrix.arch }}.deb dist/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cobbled-deb-${{ matrix.arch }}
          path: dist/cobbled_*.deb
          if-no-files-found: error

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cobble-deb-${{ matrix.arch }}
          path: dist/cobble_*.deb
          if-no-files-found: error

      - name: Attach .deb to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*.deb

  # ── Python client wheel (architecture-independent) ──────────────────────────
  build-python:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          pip install build
          python -m build packages/cobble-client --outdir dist/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cobble-client-wheel
          path: dist/*.whl
          if-no-files-found: error

      - name: Attach wheel to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*.whl
